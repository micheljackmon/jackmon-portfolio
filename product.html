<div class="grid-8">

  <div class="work-item">
    <video 
      src="assets/images/product-1.mp4" 
      controls 
      poster="assets/images/product-1_cover.png" 
      style="width:100%; max-height:360px; object-fit:contain; display:block;"
    ></video>
  </div>
  <div class="work-item">
    <video 
      src="assets/images/product-2.mp4" 
      controls 
      poster="assets/images/product-2_cover.jpg" 
      style="width:100%; max-height:360px; object-fit:contain; display:block;"
    ></video>
  </div>

  <div class="work-item"><img src="assets/images/product-3.gif"></div>
  <div class="work-item"><img src="assets/images/product-4.gif" onerror="this.parentElement.style.display='none'" style="width:100%;display:block;"></div>
  <div class="work-item"><img src="assets/images/product-5.gif" onerror="this.parentElement.style.display='none'" style="width:100%;display:block;"></div>
  <div class="work-item"><img src="assets/images/product-6.gif" onerror="this.parentElement.style.display='none'" style="width:100%;display:block;"></div>
  <div class="work-item"><img src="assets/images/product-7.gif" onerror="this.parentElement.style.display='none'" style="width:100%;display:block;"></div>
  <div class="work-item"><img src="assets/images/product-8.gif" onerror="this.parentElement.style.display='none'" style="width:100%;display:block;"></div>
  <div class="work-item">
    <video 
      src="assets/images/product-9.mp4" 
      controls

  <div class="work-item">

  </div>
    <div class="work-item">
    <video 
      src="assets/images/product-11.mp4" 
      controls 
      poster="assets/images/product-11_cover.png" 
      style="width:100%; max-height:360px; object-fit:contain; display:block;"
    ></video>
  </div>
</div>

<div class="modal"></div>

<script>
  const modal = document.querySelector('.modal');
  const items = document.querySelectorAll('.work-item');
  items.forEach((el, i) => {
    el.onclick = () => {
      modal.innerHTML = `<img src="${el.querySelector('img').src}">`;
      modal.classList.add('show');
    };
  });
  modal.onclick = () => modal.classList.remove('show');
</script>
